<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>StackSpeak</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #0B0C0E; overflow-x: hidden; }
  * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
  button { font: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "showLightAndDark": true,
  "density": "roomy"
}/*EDITMODE-END*/;

const SCREENS = [
  { id: 'onboard',  label: '01 Onboarding',       sub: 'First run · starts at L1' },
  { id: 'home',     label: '02 Today',            sub: 'Daily 5 cards · expand in place' },
  { id: 'detail',   label: '03 Word detail',      sub: 'Definition · etymology · code' },
  { id: 'review',   label: '04 Review',           sub: 'Flashcard · spaced repetition' },
  { id: 'search',   label: '05 Library',          sub: 'Search past words' },
  { id: 'profile',  label: '06 You',              sub: 'Streak · activity · saved' },
];

function Phone({ screen, mode, density, sharedState }) {
  const t = useTheme(mode, density);
  const [tab, setTab] = sharedState.tab;
  const [expanded, setExpanded] = sharedState.expanded;
  const [detailId, setDetailId] = sharedState.detail;
  const [saved, setSaved] = sharedState.saved;
  const [knownIds, setKnownIds] = sharedState.known;
  const markKnown = (id) => setKnownIds(ids => ids.includes(id) ? ids : [...ids, id]);

  let body, showTabBar = true;
  if (screen === 'onboard') { body = <OnboardingScreen t={t}/>; showTabBar = false; }
  else if (screen === 'home')    body = <HomeScreen t={t} expanded={expanded} setExpanded={setExpanded} onOpen={(id) => setDetailId(id)} knownIds={knownIds} markKnown={markKnown}/>;
  else if (screen === 'detail')  { const w = WORDS_TODAY.find(x => x.id === (detailId || 'backpressure')); body = <DetailScreen t={t} word={w} onBack={() => setDetailId(null)} saved={saved} setSaved={setSaved}/>; showTabBar = false; }
  else if (screen === 'review')  { body = <ReviewScreen t={t}/>; showTabBar = false; }
  else if (screen === 'search')  body = <SearchScreen t={t}/>;
  else if (screen === 'profile') body = <ProfileScreen t={t}/>;

  // tab change routes to the right screen id
  const handleTab = (id) => {
    setTab(id);
  };

  const dark = mode === 'dark';
  return (
    <div style={{
      width: 390, height: 844, borderRadius: 54,
      background: dark ? '#000' : '#F2F2F7',
      position: 'relative', overflow: 'hidden',
      boxShadow: dark
        ? '0 40px 80px rgba(0,0,0,0.5), 0 0 0 1.5px rgba(255,255,255,0.08), inset 0 0 0 6px #111'
        : '0 40px 80px rgba(0,0,0,0.22), 0 0 0 1.5px rgba(0,0,0,0.14), inset 0 0 0 6px #d9d9df',
      fontFamily: 'Inter, -apple-system, system-ui, sans-serif',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 120, height: 34, borderRadius: 22, background: '#000', zIndex: 100,
      }}/>
      {/* status bar */}
      <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 90 }}>
        <IOSStatusBar dark={dark} />
      </div>
      {/* body */}
      <div style={{ position: 'absolute', inset: 0 }}>
        {body}
      </div>
      {/* tab bar */}
      {showTabBar && <TabBar active={tab} onChange={handleTab} t={t}/>}
      {/* home indicator */}
      <div style={{
        position: 'absolute', bottom: 8, left: '50%', transform: 'translateX(-50%)',
        width: 134, height: 5, borderRadius: 100, zIndex: 95,
        background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
      }}/>
    </div>
  );
}

function PhonePair({ screen, density, sharedState, showBoth }) {
  if (!showBoth) {
    return <Phone screen={screen} mode="dark" density={density} sharedState={sharedState}/>;
  }
  return (
    <div style={{ display: 'flex', gap: 36 }}>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
        <Phone screen={screen} mode="light" density={density} sharedState={sharedState}/>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5,
          letterSpacing: 1.4, color: 'rgba(255,255,255,0.3)', textTransform: 'uppercase',
        }}>light</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 14 }}>
        <Phone screen={screen} mode="dark" density={density} sharedState={sharedState}/>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5,
          letterSpacing: 1.4, color: 'rgba(255,255,255,0.3)', textTransform: 'uppercase',
        }}>dark</div>
      </div>
    </div>
  );
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [tweaksOn, setTweaksOn] = React.useState(false);

  // shared state across screens + tab routing
  const [tab, setTab] = React.useState('home');
  const [expanded, setExpanded] = React.useState('idempotent');
  const [detail, setDetail] = React.useState(null);
  const [saved, setSaved] = React.useState(['backpressure', 'monad']);
  const [knownIds, setKnownIds] = React.useState([]);

  // which screen to highlight (comes from tab + detail override)
  const activeScreen = detail ? 'detail' : tab;

  const sharedState = {
    tab: [tab, setTab],
    expanded: [expanded, setExpanded],
    detail: [detail, setDetail],
    saved: [saved, setSaved],
    known: [knownIds, setKnownIds],
  };

  // Tweaks protocol
  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setTweaksOn(true);
      if (d.type === '__deactivate_edit_mode') setTweaksOn(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const updateTweak = (key, value) => {
    const next = { ...tweaks, [key]: value };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: value } }, '*');
  };

  // Sections shown on canvas
  const orderedScreens = ['onboard', 'home', 'detail', 'review', 'search', 'profile'];

  return (
    <div style={{
      minHeight: '100vh', background: '#0B0C0E', color: '#E6E6EA',
      fontFamily: 'Inter, sans-serif', padding: '48px 56px 120px',
    }}>
      {/* Canvas header */}
      <div style={{ maxWidth: 1400, margin: '0 auto 48px' }}>
        <div style={{
          fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: 2,
          color: 'rgba(255,255,255,0.35)', textTransform: 'uppercase', marginBottom: 10,
        }}>
          stack<span style={{ color: '#8B93FF' }}>/</span>speak · ios vocabulary for developers
        </div>
        <div style={{
          fontSize: 38, fontWeight: 600, letterSpacing: -0.8, marginBottom: 10, color: '#F2F2F4',
        }}>
          Five quiet words, every weekday.
        </div>
        <div style={{
          fontFamily: 'Instrument Serif, serif', fontStyle: 'italic', fontSize: 18,
          color: 'rgba(255,255,255,0.55)', maxWidth: 560, lineHeight: 1.4,
        }}>
          A card-based reader paced for a morning coffee — designed at the intersection of Bear’s warmth and Linear’s restraint. Theme toggles and density live in Tweaks.
        </div>
      </div>

      {/* Grid of screens */}
      <div style={{ maxWidth: 1400, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 96 }}>
        {orderedScreens.map((id, i) => {
          const meta = SCREENS.find(s => s.id === id);
          return (
            <section key={id} data-screen-label={meta.label} style={{ display: 'flex', gap: 56, alignItems: 'flex-start' }}>
              <div style={{ width: 260, paddingTop: 32, position: 'sticky', top: 32, flexShrink: 0 }}>
                <div style={{
                  fontFamily: 'JetBrains Mono, monospace', fontSize: 11, letterSpacing: 1.4,
                  color: 'rgba(255,255,255,0.35)', textTransform: 'uppercase', marginBottom: 8,
                }}>{meta.label}</div>
                <div style={{ fontSize: 19, fontWeight: 500, letterSpacing: -0.2, color: '#F2F2F4', marginBottom: 6 }}>
                  {meta.sub}
                </div>
                <div style={{
                  fontFamily: 'Instrument Serif, serif', fontStyle: 'italic', fontSize: 14,
                  lineHeight: 1.45, color: 'rgba(255,255,255,0.5)',
                }}>
                  {({
                    onboard: 'No signup, no level quiz — everyone starts at L1 and levels up naturally.',
                    home:    'A card per word. Tap to expand, or skip ones you already know.',
                    detail:  'The full page — definition, sentence, code, etymology.',
                    review:  'Spaced repetition without the dopamine theater.',
                    search:  'Every word you’ve learned, searchable.',
                    profile: 'Streaks and recall without the leaderboard.',
                  })[id]}
                </div>
              </div>
              <div style={{ flex: 1, display: 'flex', justifyContent: 'center' }}>
                <PhonePair
                  screen={id}
                  density={tweaks.density}
                  sharedState={sharedState}
                  showBoth={tweaks.showLightAndDark}
                />
              </div>
            </section>
          );
        })}
      </div>

      {/* Tweaks panel */}
      {tweaksOn && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, zIndex: 1000,
          width: 280, background: '#141519', border: '1px solid rgba(255,255,255,0.1)',
          borderRadius: 16, padding: 16, color: '#F2F2F4',
          boxShadow: '0 20px 60px rgba(0,0,0,0.5)',
          fontFamily: 'Inter, sans-serif',
        }}>
          <div style={{
            fontFamily: 'JetBrains Mono, monospace', fontSize: 10.5, letterSpacing: 1.4,
            color: 'rgba(255,255,255,0.5)', textTransform: 'uppercase', marginBottom: 14,
          }}>Tweaks</div>

          <div style={{ marginBottom: 14 }}>
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 8 }}>Theme view</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {[
                { k: true, label: 'Light + Dark' },
                { k: false, label: 'Dark only' },
              ].map(o => (
                <button key={o.label} onClick={() => updateTweak('showLightAndDark', o.k)} style={{
                  flex: 1, padding: '8px 10px', borderRadius: 8,
                  border: tweaks.showLightAndDark === o.k ? '1px solid #8B93FF' : '1px solid rgba(255,255,255,0.1)',
                  background: tweaks.showLightAndDark === o.k ? 'rgba(139,147,255,0.12)' : 'transparent',
                  color: '#F2F2F4', fontSize: 12, cursor: 'pointer',
                }}>{o.label}</button>
              ))}
            </div>
          </div>

          <div>
            <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.6)', marginBottom: 8 }}>Card density</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {['compact', 'roomy'].map(d => (
                <button key={d} onClick={() => updateTweak('density', d)} style={{
                  flex: 1, padding: '8px 10px', borderRadius: 8,
                  border: tweaks.density === d ? '1px solid #8B93FF' : '1px solid rgba(255,255,255,0.1)',
                  background: tweaks.density === d ? 'rgba(139,147,255,0.12)' : 'transparent',
                  color: '#F2F2F4', fontSize: 12, cursor: 'pointer', textTransform: 'capitalize',
                }}>{d}</button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
