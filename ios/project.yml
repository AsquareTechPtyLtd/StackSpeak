name: StackSpeak

options:
  bundleIdPrefix: com.stackspeak
  createIntermediateGroups: true
  generateEmptyDirectories: false
  deploymentTarget:
    iOS: "17.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"        # iPhone + iPad

targets:

  # ── Main app target ──────────────────────────────────────────────────────────

  StackSpeak:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: StackSpeak
        excludes:
          - "**/.DS_Store"

    info:
      path: StackSpeak/Info.plist
      properties:
        CFBundleDisplayName: StackSpeak
        CFBundleName: StackSpeak
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true

        # SwiftUI app lifecycle — no Storyboard needed
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}

        # Launch screen via Info.plist (no LaunchScreen.storyboard)
        UILaunchScreen: {}

        # Supported interface orientations (iPhone + iPad)
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        # Privacy usage descriptions (required for App Store)
        NSMicrophoneUsageDescription: "StackSpeak uses the microphone to let you speak your own explanation of each word instead of typing it."
        NSSpeechRecognitionUsageDescription: "StackSpeak uses speech recognition to transcribe your spoken explanations of each word."

        # Custom fonts — filenames must match files in Resources/Fonts/
        UIAppFonts:
          - Inter-Regular.ttf
          - Inter-Medium.ttf
          - Inter-SemiBold.ttf
          - Inter-Bold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
          - InstrumentSerif-Italic.ttf

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stackspeak.ios
        DEVELOPMENT_TEAM: ""           # Fill in your team ID before signing
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: NO    # Not needed for iOS
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        # Swift 6 language mode enforces strict concurrency at compile time
        SWIFT_VERSION: "6.0"
        CODE_SIGN_ENTITLEMENTS: StackSpeak/StackSpeak.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  # ── Unit test target ─────────────────────────────────────────────────────────

  StackSpeakTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: StackSpeakTests
        excludes:
          - "**/.DS_Store"

    dependencies:
      - target: StackSpeak

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.stackspeak.StackSpeakTests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES

# ── Schemes ───────────────────────────────────────────────────────────────────

schemes:
  StackSpeak:
    build:
      targets:
        StackSpeak: all
        StackSpeakTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - name: StackSpeakTests
          randomExecutionOrder: true
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
